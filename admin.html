<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HandloomHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <h2>HandloomHub Admin</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
</header>

<section class="dashboard">

    <h1>Admin Dashboard</h1>

    <div class="stats">

        <div class="card">
            <h2 id="userCount">0</h2>
            <p>Total Users</p>
        </div>

        <div class="card">
            <h2 id="productCount">0</h2>
            <p>Total Products</p>
        </div>

        <div class="card">
            <h2 id="orderCount">0</h2>
            <p>Total Orders</p>
        </div>

    </div>

    <h2>Orders</h2>

    <table>
        <thead>
            <tr>
                <th>User ID</th>
                <th>Total Amount</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="ordersTable">

        </tbody>
    </table>

</section>

<script src="js/admin.js"></script>

</body>
</html>
