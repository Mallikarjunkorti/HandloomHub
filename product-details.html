<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - HandloomHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/products.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/details.css">
</head>
<body>

<header>
    <nav>
        <h2>HandloomHub</h2>

        <ul>
            <li><a href="index.html">Home</a></li>

            <li><a href="products.html">Products</a></li>

            <li>
                <a href="cart.html">
                    Cart (<span id="cartCount">0</span>)
                </a>
            </li>

            <li>
                <a href="wishlist.html">
                    ❤️ Wishlist (<span id="wishlistCount">0</span>)
                </a>
            </li>
        </ul>

    </nav>
</header>

<!-- Product Details -->

<section class="details-container">

    <div class="details-image">

        <img
            id="productImage"
            src=""
            alt="Product Image">

    </div>

    <div class="details-content">

        <h1 id="productName"></h1>
        <div class="product-rating">

            ⭐ <span id="productRating"></span>

            (<span id="productReviews"></span> Reviews)

        </div>

        <h2 id="productPrice"></h2>
            <div class="stock-status">

                🔥 Limited Stock

            </div>
        <p id="productDescription"></p>

        <label>Quantity</label>

        <input
            type="number"
            id="quantity"
            value="1"
            min="1">

        <br><br>

        <button id="addToCartBtn">
    🛒 Add To Cart
</button>

<br><br>

<button id="buyNowBtn">
    ⚡ Buy Now
</button>

<br><br>

<button id="wishlistBtn">
    ❤️ Add To Wishlist
</button>

<br><br>

<a id="passportLink">
    <button>
        🧵 View Digital Passport
    </button>
</a>

    </div>

</section>

<!-- ==========================================
     Similar Handloom Picks
========================================== -->

<section class="related-products">

    <div class="container">

        <div class="section-title">

            <span>You May Also Like</span>

            <h2>✨ Similar Handloom Picks</h2>

            <p>

                Explore more handcrafted products from our artisans.

            </p>

        </div>

        <div
            id="relatedProducts"
            class="products-grid">

        </div>

    </div>

</section>
<div id="toast" class="toast">
    <span id="toastMessage"></span>
</div>
<script src="js/storage.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/components/toast.js"></script>
<script src="js/data/products.js"></script>
<script src="js/events/product-events.js"></script>
<script src="js/components/product-card.js"></script>
<script src="js/components/toast.js"></script>
<script src="js/components/navbar.js"></script>
<script src="js/script.js"></script>
<script src="js/product-details.js"></script>
</body>
</html>
