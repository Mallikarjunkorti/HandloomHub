<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <h2>HandloomHub</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
    </nav>
</header>

<section class="details-container">

    <div class="details-image">
        <img src="images/mysore-silk.jpg" alt="Mysore Silk Saree">
    </div>

    <div class="details-content">
        <h1>Mysore Silk Saree</h1>

        <h2>₹4,999</h2>

        <p>
            Premium Mysore Silk Saree crafted with traditional handloom
            techniques. Soft texture, elegant design, and perfect for
            weddings and special occasions.
        </p>

        <label>Quantity:</label>
        <input type="number" value="1" min="1">

        <br><br>

        <button>Add to Cart</button>
    </div>

</section>

<section class="related-products">

    <h2>Related Products</h2>

    <div class="product-grid">

        <div class="product-card">
            <img src="images/banarasi.jpg" alt="">
            <h3>Banarasi Saree</h3>
            <p>₹6499</p>
        </div>

        <div class="product-card">
            <img src="images/dupatta.jpg" alt="">
            <h3>Handloom Dupatta</h3>
            <p>₹699</p>
        </div>

    </div>

</section>

</body>
</html>
