<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation | HandloomHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>

        <h2>HandloomHub</h2>

        <ul>

            <li><a href="index.html">Home</a></li>

            <li><a href="products.html">Products</a></li>

            <li>
                <a href="cart.html">
                    Cart (<span id="cartCount">0</span>)
                </a>
            </li>

            <li>
                <a href="wishlist.html">
                    ❤️ Wishlist (<span id="wishlistCount">0</span>)
                </a>
            </li>

        </ul>

    </nav>
</header>

<section class="confirmation-container">

    <h1>🎉 Order Placed Successfully!</h1>

    <p>
        Thank you for shopping with
        <strong>HandloomHub</strong>.
    </p>

    <div class="confirmation-card">

        <h2>📦 Order Details</h2>

        <p>
            <strong>Order ID:</strong>
            <span id="orderId"></span>
        </p>

        <p>
            <strong>Order Date:</strong>
            <span id="orderDate"></span>
        </p>

        <p>
            <strong>Payment:</strong>
            <span id="paymentMethod"></span>
        </p>

        <p>
            <strong>Total Amount:</strong>
            <span id="totalAmount"></span>
        </p>

        <p>
            <strong>Status:</strong>
            <span id="status" style="color:orange;font-weight:bold;"></span>
        </p>

        <p>
            <strong>Estimated Delivery:</strong>
            <span id="deliveryDate"></span>
        </p>

    </div>

    <br>

    <a href="products.html">
        <button>🛍 Continue Shopping</button>
    </a>

    <a href="orders.html">
        <button>📦 My Orders</button>
    </a>

</section>
<div id="toast" class="toast">
    <span id="toastMessage"></span>
</div>
<script src="js/storage.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/events/product-events.js"></script>
<script src="js/components/toast.js"></script>
<script src="js/components/navbar.js"></script>
<script src="js/script.js"></script>
<script src="js/confirmation.js"></script>

</body>
</html>
