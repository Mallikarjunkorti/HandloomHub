<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - HandloomHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/products.css">
</head>
<body>

<header>
    <nav>

        <h2>HandloomHub</h2>

        <ul>

            <li><a href="index.html">Home</a></li>

            <li><a href="products.html">Products</a></li>

            <li>
                <a href="cart.html">
                    Cart (<span id="cartCount">0</span>)
                </a>
            </li>

            <li id="loginLink">
                <a href="login.html">Login</a>
            </li>

            <li id="logoutLink" style="display:none;">
                <a href="#" onclick="logout()">Logout</a>
            </li>

            <li id="adminLink" style="display:none;">
                <a href="admin.html">Admin</a>
            </li>

            <li>
                <a href="wishlist.html">
                    ❤️ Wishlist (<span id="wishlistCount">0</span>)
                </a>
            </li>

        </ul>

    </nav>
</header>

<section class="products-page">

    <div class="container">

        <div class="page-header">

            <h1>Our Collection</h1>

            <p>
                Discover handcrafted treasures from artisans across India.
            </p>

        </div>

        <div class="products-toolbar">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search products...">

            <select id="categoryFilter">

                <option value="all">All Categories</option>

                <option value="Sarees">Sarees</option>

                <option value="Fabric">Fabrics</option>

                <option value="Kurti">Kurtis</option>

                <option value="Dupatta">Dupattas</option>

            </select>

            <select id="sortProducts">

                <option value="featured">Featured</option>

                <option value="rating">Highest Rated</option>

                <option value="low">Price: Low to High</option>

                <option value="high">Price: High to Low</option>

            </select>

        </div>

        <div
            id="productsGrid"
            class="products-grid">

        </div>

    </div>

</section>

<!-- ==========================================
     QUICK VIEW MODAL
========================================== -->

<div id="quickViewModal" class="quick-view-modal">

    <div class="quick-view-content">

        <button id="closeModal" class="close-modal">

           &times;

        </button>

        <div class="quick-view-grid">

            <div class="quick-view-image">

                <img
                    id="modalImage"
                    src=""
                    alt="Product">

            </div>

            <div class="quick-view-details">

                <span id="modalBadge" class="modal-badge"></span>

                <h2 id="modalTitle"></h2>

                <div class="modal-rating">

                    ⭐
                    <span id="modalRating"></span>

                    (<span id="modalReviews"></span> Reviews)

                </div>

                <h3 id="modalPrice"></h3>

                <div class="modal-features">

                    <div class="feature-box">
                        ✔ 100% Authentic Handloom
                     </div>

                    <div class="feature-box">
                        🚚 Free Delivery
                    </div>

                    <div class="feature-box">
                        🔒 Secure Payment
                    </div>

                </div>

                <div class="modal-buttons">

                    <button id="modalCart" class="btn btn-primary">

                        🛒 Add to Cart

                    </button>

                    <button id="modalBuy" class="btn btn-secondary">

                         ⚡ Buy Now

                    </button>
                </div>

                <a
                    id="modalPassport"
                    class="passport-link"
                    href="#">

                    🛡 View Digital Passport →

                </a>

            </div>

        </div>

    </div>

</div>
 <div id="toast" class="toast">
    <span id="toastMessage"></span>
 </div>
<script src="js/storage.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>

<script src="js/data/products.js"></script>
<script src="js/events/product-events.js"></script>
<script src="js/components/product-card.js"></script>
<script src="js/pages/products-page.js"></script>
<script src="js/components/toast.js"></script>
<script src="js/components/navbar.js"></script>
<script src="js/script.js"></script>

</body>
</html>
