<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
    <h2>HandloomHub</h2>
    <ul>
        <li><a href="index.html">Home</a></li>

<li><a href="products.html">Products</a></li>

<li>
    <a href="cart.html">
        Cart (<span id="cartCount">0</span>)
    </a>
</li>

<li id="loginLink">
    <a href="login.html">Login</a>
</li>

<li id="logoutLink" style="display:none;">
    <a href="#" onclick="logout()">Logout</a>
</li>

<li id="adminLink" style="display:none;">
    <a href="admin.html">Admin</a>
</li>
<li>

</header>

<section class="product-page">

    <h1>Our Products</h1>

    <input type="text" id="searchInput" placeholder="Search Products...">

    <div class="product-grid">

        <div class="product-card">
            <img src="images/mysore-silk.jpg" alt="">
            <h3>Mysore Silk Saree</h3>
            <p>₹4999</p>
            <button onclick="addToCart('Mysore Silk Saree',4999,'images/mysore-silk.jpg')"> 
            Add to Cart
            </button>
            <button onclick="addToWishlist('Mysore Silk Saree',4999)">
                  ❤️ Wishlist
            </button>
            <a href="product-details.html">View Details</a>
        </div>

        <div class="product-card">
            <img src="images/banarasi.jpg" alt="">
            <h3>Banarasi Saree</h3>
            <p>₹6499</p>
            <button onclick="addToCart('Banarasi Saree',6499,'images/banarasi.jpg')">
                    Add to Cart
            </button>
            <button onclick="addToWishlist('Mysore Silk Saree',4999)">
                   ❤️ Wishlist
            </button>
            <a href="product-details.html">View Details</a>
        </div>

        <div class="product-card">
            <img src="images/cotton-fabric.jpg" alt="">
            <h3>Cotton Fabric</h3>
            <p>₹899</p>
            <button onclick="addToCart('Cotton Fabric',899,'images/cotton-fabric.jpg')">Add to Cart</button>
            <button onclick="addToWishlist('Mysore Silk Saree',4999)">
                    ❤️ Wishlist
            </button>
            <a href="product-details.html">View Details</a>
        </div>

        <div class="product-card">
            <img src="images/kurti.jpg" alt="">
            <h3>Kurti Material</h3>
            <p>₹1299</p>
            <button onclick="addToCart('Kurti Material',1299,'images/kurti.jpg')">Add to Cart</button>
            <button onclick="addToWishlist('Mysore Silk Saree',4999)">
                    ❤️ Wishlist
            </button>
            <a href="product-details.html">View Details</a>
        </div>

    </div>

</section>

<script src="js/script.js"></script>

</html>
