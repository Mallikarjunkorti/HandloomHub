<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandloomHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav>
    <h2>HandloomHub</h2>

    <ul>

        <li><a href="index.html">Home</a></li>

<li><a href="products.html">Products</a></li>

<li>
    <a href="cart.html">
        Cart (<span id="cartCount">0</span>)
    </a>
</li>

<li id="loginLink">
    <a href="login.html">Login</a>
</li>

<li id="logoutLink" style="display:none;">
    <a href="#" onclick="logout()">Logout</a>
</li>

<li id="adminLink" style="display:none;">
    <a href="admin.html">Admin</a>
</li>

    </ul>

    <span id="welcomeUser"></span>

</nav>
    </header>

    <section class="hero">
        <h1>Welcome to HandloomHub</h1>
        <p>Discover Authentic Handloom Products</p>
        <button onclick="location.href='products.html'">
            Shop Now
        </button>
    </section>

    <section class="products">
        <h2>Featured Products</h2>

        <div class="product-container">

            <div class="card">
                <img src="images/mysore-silk.jpg" alt="">
                <h3>Mysore Silk Saree</h3>
                <p>₹4999</p>
            </div>

            <div class="card">
                <img src="images/banarasi.jpg" alt="">
                <h3>Banarasi Saree</h3>
                <p>₹6499</p>
            </div>

            <div class="card">
                <img src="images/dupatta.jpg" alt="">
                <h3>Handloom Dupatta</h3>
                <p>₹699</p>
            </div>
            <div class="card">
                <img src="images/kurti.jpg" alt="">
                <h3>Handloom Kurti</h3>
                <p>₹1299</p>
            </div>

        </div>
    </section>

    <footer>
        <p>© 2026 HandloomHub</p>
    </footer>
    <script>
const user = JSON.parse(localStorage.getItem("loggedInUser"));

const welcomeUser = document.getElementById("welcomeUser");
const loginLink = document.getElementById("loginLink");
const logoutLink = document.getElementById("logoutLink");
const adminLink = document.getElementById("adminLink");

// Hide Admin by default
adminLink.style.display = "none";

if (user) {

    // Welcome message
    welcomeUser.innerText = "Welcome, " + user.name;

    // Show Logout
    loginLink.style.display = "none";
    logoutLink.style.display = "block";

    // Show Admin ONLY for admin email
    if (user.email === "mallikarjunkorti40@gmail.com") {
        adminLink.style.display = "block";
    }

} else {

    // Not logged in
    loginLink.style.display = "block";
    logoutLink.style.display = "none";
    adminLink.style.display = "none";
}

function logout() {

    localStorage.removeItem("loggedInUser");

    alert("Logged Out Successfully");

    window.location.href = "login.html";
}
</script>
</body>
</html>
